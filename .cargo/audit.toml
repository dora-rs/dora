# cargo-audit configuration. Keep ignore entries in sync with deny.toml
# (cargo-deny enforces the same policy; both run in `make qa-audit`).
[advisories]
ignore = [
    # pyo3 0.28 OOB read in PyList/PyTuple iterator nth/nth_back. The
    # affected APIs are not used in this workspace; the pyo3 0.29 upgrade
    # is tracked in https://github.com/dora-rs/dora/issues/2157.
    # Review: 2026-07.
    "RUSTSEC-2026-0176",
    # pyo3 0.28 missing Sync bound on PyCFunction::new_closure — unused
    # in this workspace; same upgrade tracked in #2157.
    "RUSTSEC-2026-0177",
    # quick-xml <0.41 DoS advisories. Our own dora-ros2-bridge-msg-gen is on
    # 0.41; the remaining <0.41 copies are transitive via mavlink-bindgen
    # (build-time parsing of vendored MAVLink XML definitions) and self_update
    # (parses api.github.com release metadata) — neither parses
    # attacker-controlled XML at runtime. Remove when upstreams bump.
    # Review: 2026-10.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
