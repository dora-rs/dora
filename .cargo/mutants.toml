# ---- Equivalent mutants (documented) ----
#
# libraries/core/src/types.rs:177:29  replace || with && in types_match
#
# Context (types.rs lines 166-188):
#
#     pub fn types_match(a: &str, b: &str) -> bool {
#         let Some(pa) = parse_urn(a) else { return a == b; };
#         let Some(pb) = parse_urn(b) else { return a == b; };
#         if pa.base != pb.base { return false; }
#         if pa.params.is_empty() || pb.params.is_empty() {   // <-- mutation here
#             return true;
#         }
#         for (k, va) in &pa.params {
#             if let Some(vb) = pb.params.get(k) {
#                 if va != vb { return false; }
#             }
#         }
#         true
#     }
#
# Reasoning: if we change `||` to `&&`, the early-return fast path is
# only taken when BOTH sides have empty params. In every other case
# execution continues into the for loop. But:
#   - If pa.params is empty, the loop body does not execute, and we
#     return `true` at the end — same as the fast path.
#   - If pb.params is empty but pa.params is not, the loop iterates
#     over pa.params, pb.params.get(k) always returns None, the body
#     does not return `false`, and we fall through to `true` — same
#     as the fast path.
# Therefore the `&&` mutation produces identical output for all inputs.
# This is a genuine equivalent mutant and cannot be tested around.
#
# If the function is refactored in a way that breaks this equivalence,
# remove this waiver and expect the mutation to be caught by existing
# tests.
exclude_re = [
    "libraries/core/src/types\\.rs:177:29.*replace \\|\\| with &&.*types_match",
]
