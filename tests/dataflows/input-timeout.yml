nodes:
  - id: rust-node
    build: cargo build -p rust-dataflow-example-node
    path: ../../target/debug/rust-dataflow-example-node
    inputs:
      tick: dora/timer/millis/100
    outputs:
      - random

  - id: rust-status-node
    build: cargo build -p rust-dataflow-example-status-node
    path: ../../target/debug/rust-dataflow-example-status-node
    inputs:
      tick: dora/timer/millis/100
      trigger-exit: dora/timer/millis/500
      random: rust-node/random
    outputs:
      - status
      - triggered-exit

  - id: rust-sink
    build: cargo build -p rust-dataflow-example-sink
    path: ../../target/debug/rust-dataflow-example-sink
    inputs:
      message: rust-status-node/status
      exit:
        source: rust-status-node/triggered-exit
        input_timeout: 2.0
