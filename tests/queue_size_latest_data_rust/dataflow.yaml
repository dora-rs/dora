nodes:
  - id: send_data
    path: ../queue_size_latest_data_python/send_data.py
    inputs:
      tick: adora/timer/millis/10
    outputs:
      - data

  - id: receive_data_with_sleep
    path: ../../target/debug/receive_data
    build: cargo build -p receive_data
    inputs:
      tick:
        source: send_data/data
        queue_size: 1
