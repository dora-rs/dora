nodes:
  - id: rust-node
    _unstable_deploy:
      machine: A
    build: cargo build -p multiple-daemons-example-node
    path: ../../target/debug/multiple-daemons-example-node
    inputs:
      tick: dora/timer/millis/10
    outputs:
      - random

  - id: runtime-node
    _unstable_deploy:
      machine: A
    operators:
      - id: rust-operator
        build: cargo build -p multiple-daemons-example-operator
        shared-library: ../../target/debug/multiple_daemons_example_operator
        inputs:
          tick: dora/timer/millis/100
          random: rust-node/random
        outputs:
          - status

  - id: rust-sink
    _unstable_deploy:
      machine: B
    build: cargo build -p multiple-daemons-example-sink
    path: ../../target/debug/multiple-daemons-example-sink
    inputs:
      message: runtime-node/rust-operator/status
      # Cross-machine consumer of an output that ALSO has a same-machine
      # consumer (runtime-node on A): `rust-node/random` is thus pinned to
      # the daemon path and must reach machine A's operator locally AND
      # machine B's sink via inter-daemon forwarding — the mixed
      # local+remote delivery case of the startup-handshake routing.
      random: rust-node/random
