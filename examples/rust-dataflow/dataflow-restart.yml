nodes:
  - id: rust-node
    build: cargo build -p rust-dataflow-example-node
    path: ../../target/debug/rust-dataflow-example-node
    inputs:
      tick: adora/timer/millis/100
    outputs:
      - random

  - id: rust-status-node
    build: cargo build -p rust-dataflow-example-status-node
    path: ../../target/debug/rust-dataflow-example-status-node
    restart_policy: on-failure
    max_restarts: 5
    restart_delay: 1.0
    max_restart_delay: 10.0
    health_check_timeout: 30.0
    inputs:
      tick: adora/timer/millis/100
      fail: adora/timer/millis/400
      trigger-exit: adora/timer/millis/300
      random: rust-node/random
    outputs:
      - status
      - triggered-exit

  - id: rust-sink
    build: cargo build -p rust-dataflow-example-sink
    path: ../../target/debug/rust-dataflow-example-sink
    restart_policy: always
    max_restarts: 10
    restart_delay: 0.5
    restart_window: 60.0
    inputs:
      exit:
        source: rust-status-node/triggered-exit
        input_timeout: 10.0
      message: rust-status-node/status
