nodes:
  - id: service-node
    path: service_node.py
    services:
      compute:
        type: server

  - id: requester-node
    path: requester_node.py
    inputs:
      request_tick: dora/timer/millis/200
      tick: dora/timer/millis/50
    services:
      compute:
        type: client
        server: service-node/compute