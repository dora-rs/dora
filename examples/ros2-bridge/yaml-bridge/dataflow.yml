nodes:
  # =============================================
  # Topic bridges (subscribe / publish)
  # =============================================

  # Subscribe to turtlesim pose via declarative ROS2 bridge
  - id: pose_bridge
    ros2:
      topic: /turtle1/pose
      message_type: turtlesim/Pose
      direction: subscribe
    outputs:
      - pose

  # Publish velocity commands to turtlesim via declarative ROS2 bridge
  - id: cmd_bridge
    ros2:
      topic: /turtle1/cmd_vel
      message_type: geometry_msgs/Twist
      direction: publish
    inputs:
      cmd_vel: planner/cmd_vel

  # Multi-topic bridge: subscribe and publish on the same ROS2 node
  - id: turtle_bridge
    ros2:
      topics:
        - topic: /turtle1/pose
          message_type: turtlesim/Pose
          direction: subscribe
          output: pose
        - topic: /turtle1/cmd_vel
          message_type: geometry_msgs/Twist
          direction: publish
          input: velocity
      qos:
        reliable: true
        keep_last: 10
    inputs:
      velocity: planner/cmd_vel
    outputs:
      - pose

  # Example planner node (user-provided)
  - id: planner
    path: path/to/planner-node
    inputs:
      pose: turtle_bridge/pose
      tick: adora/timer/millis/100
    outputs:
      - cmd_vel

  # =============================================
  # Service bridges (request / response)
  # =============================================

  # Service Client: Adora sends request to an external ROS2 service, receives response
  - id: add_client
    ros2:
      service: /add_two_ints
      service_type: example_interfaces/AddTwoInts
      role: client
    inputs:
      request: requester/data
    outputs:
      - response

  # Service Server: Adora exposes a ROS2 service for external ROS2 clients to call
  # NOTE: Uses a different service name than add_client above -- they are independent.
  - id: add_server
    ros2:
      service: /adora_add_two_ints
      service_type: example_interfaces/AddTwoInts
      role: server
    inputs:
      response: handler/result
    outputs:
      - request

  # =============================================
  # Action bridges (goal / feedback / result)
  # =============================================

  # Action Client: Adora sends goal, receives feedback + result from ROS2
  - id: nav_client
    ros2:
      action: /navigate_to_pose
      action_type: nav2_msgs/NavigateToPose
      role: client
    inputs:
      goal: goal_sender/goal
    outputs:
      - feedback
      - result
