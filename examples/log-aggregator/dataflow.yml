nodes:
  - id: sensor
    path: sensor.py
    min_log_level: info
    inputs:
      tick: dora/timer/millis/200
    outputs:
      - reading

  - id: processor
    path: processor.py
    inputs:
      reading: sensor/reading
    outputs:
      - result

  # This node receives ALL logs from ALL nodes automatically.
  # No manual wiring needed -- dora/logs subscribes to the daemon's log stream.
  - id: log-viewer
    path: log_viewer.py
    inputs:
      logs: dora/logs           # all nodes, all levels
      # Alternative filters:
      #   errors_only: dora/logs/error         # only error+ from all nodes
      #   sensor_logs: dora/logs/info/sensor   # info+ from specific node
