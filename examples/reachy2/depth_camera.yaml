nodes:
  - id: camera
    build: pip install -e ../../node-hub/dora-reachy2
    path: dora-reachy2
    inputs:
      tick: dora/timer/millis/20
    outputs:
      - image_left
      - image_right
      - image_depth
      - depth

  - id: plot
    build: pip install -e ../../node-hub/dora-rerun
    path: dora-rerun
    inputs:
      # image_left: camera/image_left
      image: camera/image_depth
      depth: camera/depth
      image_topview: topview/image
      image_zoom: zoom/image

  - id: topview
    build: pip install -e ../../node-hub/dora-pointcloud-projection
    path: dora-pointcloud-projection
    inputs:
      image: camera/image_depth
      depth: camera/depth
    outputs:
      - image
    env:
      MIN_X: "0.2"
      MAX_X: "1.5"
      MIN_Y: "-1.5"
      MAX_Y: "1.5"

  - id: zoom
    build: pip install -e ../../node-hub/dora-pointcloud-projection
    path: dora-pointcloud-projection
    inputs:
      image: camera/image_depth
      depth: camera/depth
    outputs:
      - image
    env:
      MIN_X: "0.2"
      MAX_X: "0.5"
      MIN_Y: "-0.5"
      MAX_Y: "0.5"
