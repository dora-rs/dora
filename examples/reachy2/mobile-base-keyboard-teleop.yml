nodes:
  - id: camera
    build: pip install -e ../../node-hub/dora-reachy2
    path: dora-reachy2
    inputs:
      tick: dora/timer/millis/100
      action_base: keyboard/action
    outputs:
      - image_left
      - image_right
      - image_depth
      - depth

  - id: plot
    build: pip install -e dora-rerun
    path: dora-rerun
    inputs:
      image:
        source: topview/image
        queue_size: 1
      series_keyboard: keyboard/action
    env:
      README: |
        # Visualization of QwenVL2
      RERUN_MEMORY_LIMIT: 10%

  - id: keyboard
    build: pip install -e dora-keyboard
    path: dora-keyboard
    inputs:
      tick: dora/timer/millis/1000
    outputs:
      - action

  - id: topview
    build: pip install -e ../../node-hub/dora-pointcloud-projection
    path: dora-pointcloud-projection
    inputs:
      image: camera/image_depth
      depth: camera/depth
    outputs:
      - image
    env:
      MIN_X: "0.2"
      MAX_X: "2.5"
      MIN_Y: "-1.5"
      MAX_Y: "1.5"
