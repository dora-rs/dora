  - id: reachy-both-arms
    build: pip install -e ../../node-hub/dora-reachy2
    path: /home/peter/Documents/work/dora/node-hub/dora-reachy2/dora_reachy2/both_arms.py
    inputs:
      action_arm: reachy-mobile-base/action_arm
      action_arm_2: parse_bbox/action_arm
      pose: box_coordinates/point
      text:
        source: dora-distil-whisper/text
        queue_size: 10
    outputs:
      - pause
      - rotate
      - look
    env:
      ACTIVATION_WORDS: grab pick give output take catch grabs picks gives outputs takes catches have

  - id: reachy-camera
    build: pip install -e ../../node-hub/dora-reachy2
    path: /home/peter/Documents/work/dora/node-hub/dora-reachy2/dora_reachy2/camera.py
    inputs:
      tick: dora/timer/millis/50
    outputs:
      - image_right
      - image_left
      - image_depth
      - depth
    #env:
    #ROBOT_IP: 172.17.134.85

  - id: reachy-head
    build: pip install -e ../../node-hub/dora-reachy2
    path: dora-reachy2-head
    inputs:
      boxes2d: parse_bbox/bbox_face
      look: reachy-both-arms/look

  - id: plot
    build: pip install -e ../../node-hub/dora-rerun
    path: dora-rerun
    inputs:
      camera_left/image_right: reachy-camera/image_right
      camera_torso/image: reachy-camera/image_depth
      text_response: dora-qwenvl/text
      text_whisper: dora-distil-whisper/text
      camera_torso/boxes2d: parse_bbox/bbox
      camera_left/boxes2d_face: parse_bbox/bbox_face
    env:
      RERUN_MEMORY_LIMIT: 5%

  - id: dora-qwenvl
    build: pip install -e ../../node-hub/dora-qwen2-5-vl
    path: dora-qwen2-5-vl
    inputs:
      pause_base: reachy-mobile-base/pause
      pause_arms: reachy-both-arms/pause
      image_depth: reachy-camera/image_depth
      image_left: reachy-camera/image_left
      text_1: dora/timer/millis/500
      text_2: dora-distil-whisper/text
    outputs:
      - text
      - text_ts
    env:
      #ADAPTER_PATH: /home/peter/Documents/work/LLaMA-Factory/saves/qwen2.5_vl-felix/lora/sft/checkpoint-558
      DEFAULT_QUESTION: grab human.
      ACTIVATION_WORDS: grab pick give output take catch grabs picks gives outputs takes catches have
      #SYSTEM_PROMPT: You're a robot.

  - id: parse_bbox
    path: parse_bbox.py
    inputs:
      text: dora-qwenvl/text
    outputs:
      - bbox
      - bbox_face
      - action_arm

