nodes:
  - id: dora-microphone
    build: pip install -e ../../node-hub/dora-microphone
    path: dora-microphone
    inputs:
      tick: dora/timer/millis/2000
    outputs:
      - audio

  - id: dora-vad
    build: pip install -e ../../node-hub/dora-vad
    path: dora-vad
    inputs:
      audio: dora-microphone/audio
    outputs:
      - audio

  - id: dora-distil-whisper
    build: pip install -e ../../node-hub/dora-distil-whisper
    path: dora-distil-whisper
    inputs:
      input: dora-vad/audio
    outputs:
      - text
    env:
      TARGET_LANGUAGE: english
      TRANSLATE: true

  - id: reachy-mobile-base
    build: pip install -e ../../node-hub/dora-reachy2
    path: /home/peter/Documents/work/dora/node-hub/dora-reachy2/dora_reachy2/mobile_base.py
    inputs:
      rotate: reachy-both-arms/rotate
      pose: box_coordinates/point
    outputs:
      - pause
      - action_arm
      - text_ts
    #env:
    #ROBOT_IP: 172.17.134.85

