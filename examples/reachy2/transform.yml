nodes:
  - id: reachy-left-arm
    build: pip install -e ../../node-hub/dora-reachy2
    path: dora-reachy2-left-arm
    inputs:
      pose: box_coordinates/point
    env:
      ROBOT_IP: 172.17.134.85

  - id: reachy-camera
    build: pip install -e ../../node-hub/dora-reachy2
    path: dora-reachy2-camera
    inputs:
      tick: dora/timer/millis/50
    outputs:
      - image_right
      - image_left
      - image_depth
      - depth
    env:
      ROBOT_IP: 172.17.134.85

  - id: reachy-head
    build: pip install -e ../../node-hub/dora-reachy2
    path: dora-reachy2-head
    inputs:
      boxes2d: parse_bbox/bbox_face

  - id: plot
    # build: pip install -e ../../node-hub/dora-rerun
    path: dora-rerun
    inputs:
      image_right: reachy-camera/image_right
      image_depth: reachy-camera/image_depth
      text_response: dora-qwenvl/text
      boxes2d: parse_bbox/bbox
      boxes2d_face: parse_bbox/bbox_face
    env:
      RERUN_MEMORY_LIMIT: 10%

  - id: dora-qwenvl
    build: pip install -e ../../node-hub/dora-qwen2-5-vl
    path: dora-qwen2-5-vl
    inputs:
      image_depth: reachy-camera/image_depth
      image_left: reachy-camera/image_left
      text_1: dora/timer/millis/100
    outputs:
      - text
    env:
      #ADAPTER_PATH: /home/peter/Documents/work/LLaMA-Factory/saves/qwen2.5_vl-felix/lora/sft/checkpoint-558
      DEFAULT_QUESTION: grab human.
      ACTIVATION_WORDS: grab pick give
      #SYSTEM_PROMPT: You're a robot.

  - id: parse_bbox
    path: parse_bbox.py
    inputs:
      text: dora-qwenvl/text
    outputs:
      - bbox
      - bbox_face

  - id: box_coordinates
    build: cargo build -p dora-pointcloud-projection --release
    path: dora-pointcloud-projection
    inputs:
      depth: reachy-camera/depth
      boxes2d: parse_bbox/bbox
    outputs:
      - point
