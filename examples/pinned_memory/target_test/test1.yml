# cpu发送页锁内存，cuda接收时，显式释放页锁内存。
nodes:
  - id: sender_node
    path: sender1.py
    inputs:
      next_require: receiver_node/next_require
    outputs:
      - cpu_data
    env:
      mode: pinned
      massage_num: 100
  - id: receiver_node
    path: receiver1.py
    inputs:
      latency: sender_node/cpu_data
    outputs:
      - next_require
    env:
      mode: pinned
      massage_num: 100