# Dynamic-node spec for the rust-dynamic-add-remove fixture.
# Added at runtime via `dora node add --from-yaml filter-node.yml`,
# then wired with `dora node connect`.

id: filter
# `--target-dir` pin — see dataflow.yml for the rationale (avoids the
# CARGO_TARGET_DIR/build-vs-path mismatch).
build: cargo build -p rust-dynamic-add-remove-filter --target-dir ../../target
path: ../../target/debug/rust-dynamic-add-remove-filter
outputs:
  - output
