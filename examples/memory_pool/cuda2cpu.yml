# cpu发送页锁内存，cuda接收时，显式释放页锁内存。
env:
  sender_device: cuda
  receiver_device: cpu
  massage_num: 100
nodes:
  - id: sender_node
    path: sender.py
    inputs:
      next_require: receiver_node/next_require
    outputs:
      - data
  - id: receiver_node
    path: receiver.py
    inputs:
      latency: sender_node/data
    outputs:
      - next_require