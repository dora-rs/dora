nodes:
  - id: webcam
    path: webcam.py
    inputs:
      tick: adora/timer/millis/50
    outputs:
      - image
    env:
      CAMERA_INDEX: 0

  - id: object_detection
    path: object_detection.py
    restart_policy: on-failure
    inputs:
      image: webcam/image
    outputs:
      - bbox

  - id: plot
    path: plot.py
    restart_policy: on-failure
    inputs:
      image: webcam/image
      bbox: object_detection/bbox
