# Positive throughput test: CUDA sender, CPU receiver, explicit pool release.
env:
  sender_device: cuda
  receiver_device: cpu
  massage_num: 100
  memory_pool_scenario: throughput
nodes:
  - id: sender_node
    path: sender.py
    inputs:
      next_require: receiver_node/next_require
    outputs:
      - data
  - id: receiver_node
    path: receiver.py
    inputs:
      latency: sender_node/data
    outputs:
      - next_require