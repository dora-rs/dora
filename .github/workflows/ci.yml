name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Pin Rust to 1.92 until static_init (zenoh-shm dep) is fixed for 1.94+
  RUST_VERSION: "1.92.0"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo clippy --all
          --exclude adora-node-api-python
          --exclude adora-operator-api-python
          --exclude adora-ros2-bridge-python
          -- -D warnings

  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo test --all
          --exclude adora-node-api-python
          --exclude adora-operator-api-python
          --exclude adora-ros2-bridge-python
          --exclude adora-cli-api-python
          --exclude adora-examples
          --exclude rust-dataflow-example-node
          --exclude multiple-daemons-example-operator

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build -p adora-cli --release
      - name: Install CLI
        run: cp target/release/adora /usr/local/bin/adora
      - name: Run E2E tests
        run: >
          cargo test --test ws-cli-e2e -- --test-threads=1
        timeout-minutes: 10
      - name: Run fault-tolerance tests
        run: >
          cargo test --test fault-tolerance-e2e -- --test-threads=1
        timeout-minutes: 10

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master
