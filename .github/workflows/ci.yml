name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Pin Rust to 1.92 until static_init (zenoh-shm dep) is fixed for 1.94+
  RUST_VERSION: "1.92.0"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo clippy --all
          --exclude adora-node-api-python
          --exclude adora-operator-api-python
          --exclude adora-ros2-bridge-python
          -- -D warnings

  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo test --all
          --exclude adora-node-api-python
          --exclude adora-operator-api-python
          --exclude adora-ros2-bridge-python
          --exclude adora-cli-api-python
          --exclude adora-examples
          --exclude rust-dataflow-example-node
          --exclude multiple-daemons-example-operator

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build -p adora-cli --release
      - name: Install CLI
        run: cp target/release/adora /usr/local/bin/adora
      - name: Run E2E tests
        run: >
          cargo test --test ws-cli-e2e -- --test-threads=1
        timeout-minutes: 10
      - name: Run fault-tolerance tests
        run: >
          cargo test --test fault-tolerance-e2e -- --test-threads=1
        timeout-minutes: 15

  bench:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2

      # Restore baseline from the most recent main-branch run.
      # The key uses a fixed prefix; restore-keys enables prefix matching
      # so the most recent main-branch save is found.
      - name: Restore baseline
        id: cache-baseline
        uses: actions/cache/restore@v4
        with:
          path: target/criterion
          key: bench-baseline-${{ runner.os }}-not-used
          restore-keys: bench-baseline-${{ runner.os }}-

      # Compile benchmarks first (separates build errors from bench issues)
      - name: Compile benchmarks
        run: |
          cargo bench -p adora-message -p shared-memory-server --no-run
          cargo bench -p adora-daemon --features bench --no-run

      # Run benchmarks. Criterion automatically compares against any
      # existing data in target/criterion/ (restored from cache above).
      - name: Run benchmarks
        run: |
          cargo bench -p adora-message -p shared-memory-server 2>/dev/null | tee bench-output.txt
          cargo bench -p adora-daemon --features bench 2>/dev/null | tee -a bench-output.txt

      # Always post results to step summary
      - name: Post results
        if: always()
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench-output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no output)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # On main branch: save criterion data as the new baseline
      - name: Cache baseline
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: bench-baseline-${{ runner.os }}-${{ github.sha }}

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  # ===== QA gates (see docs/plan-agentic-qa-strategy.md) =====
  # Each job calls the same local scripts (make qa-*) that developers
  # run before pushing, so CI is a verification mirror, not a separate
  # source of truth.

  audit:
    name: Audit (cargo-audit + cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - run: make qa-audit

  unwrap-budget:
    name: Unwrap budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: make qa-unwrap

  coverage:
    name: Coverage (tracked)
    runs-on: ubuntu-latest
    needs: test
    # Non-blocking: report only, do not fail the gate yet.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage
        run: make qa-coverage
      - name: Post summary
        if: always()
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Extract the TOTAL line from the summary output
          cargo llvm-cov report --summary-only 2>&1 | tail -5 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov-${{ github.sha }}
          path: lcov.info
          retention-days: 14

  semver:
    name: SemVer check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Soft gate during 0.x — warn only. Hard-fails after 1.0.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - run: make qa-semver
