name: Test C/C++ Libraries

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-c-node:
    name: Test C Node API (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-latest
          - os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build dora-node-api-c
        run: cargo build --release --package dora-node-api-c

      - name: Install dora CLI
        run: cargo install --path binaries/cli

      - name: Stage C library files
        run: cargo run -p xtask -- stage-c-node target/release dora-test-prefix

      - name: Create test node
        run: dora new test-node --kind node --lang c

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: |
          cd test-node && mkdir build && cd build
          cmake .. -DCMAKE_PREFIX_PATH=${{ github.workspace }}/dora-test-prefix

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cd test-node
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=${{ github.workspace }}/dora-test-prefix

      - name: Build test node
        run: |
          cd test-node/build
          cmake --build . --config Release
