name: Nightly Regression

# Deep regression coverage that runs outside the PR cycle.
#
# Tier 1 gates per docs/testing-matrix.md:
#   - Full example-smoke suite (~11 min)
#   - Service/action communication patterns (Rust-only)
#   - Streaming example (Python)
#   - Log-sink example dataflows (Python sources)
#   - Record/replay round-trip
#
# Failures file issues with the `nightly-regression` label; they do not
# block PRs. If a failure reproduces for 3 consecutive nightly runs,
# promote it to the fast CI gate.
#
# Triggers:
#   - schedule: daily at 06:00 UTC
#   - workflow_dispatch: manual run from Actions UI

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"

jobs:
  smoke-suite:
    name: Smoke suite (tests/example-smoke.rs)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python venv
        run: |
          uv venv --seed -p 3.12
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          source .venv/bin/activate
          uv pip install pyarrow
          uv pip install -e apis/python/node
      - name: Run smoke suite
        id: smoke
        continue-on-error: true
        run: |
          cargo test -p dora-examples --test example-smoke -- --test-threads=1 2>&1 | tee smoke-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Upload smoke log
        uses: actions/upload-artifact@v4
        with:
          name: smoke-output
          path: smoke-output.log
          retention-days: 14
      - name: Fail the job if smoke suite failed
        if: steps.smoke.outputs.exit_code != '0'
        run: exit 1

  # Build the dora CLI once and upload as artifact for downstream jobs.
  # Saves ~15 min × 4 downstream jobs = ~60 runner-minutes per nightly run.
  build-cli:
    name: Build dora CLI (shared)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Install dora CLI to ./dist
        run: cargo install --path binaries/cli --locked --root ./dist
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-cli
          path: dist/bin/dora
          retention-days: 1

  log-sinks:
    name: Log-sink examples (Python sources)
    runs-on: ubuntu-latest
    needs: build-cli
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python venv
        # Required because every log-sink example has Python source nodes
        # (sensor.py / source.py). Mirrors the ci.yml Python setup.
        run: |
          uv venv --seed -p 3.12
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          source .venv/bin/activate
          uv pip install pyarrow
          uv pip install -e apis/python/node
      - name: Download dora CLI
        uses: actions/download-artifact@v4
        with:
          name: dora-cli
          path: ./cli-bin
      - name: Install CLI to PATH
        run: |
          chmod +x ./cli-bin/dora
          echo "$PWD/cli-bin" >> "$GITHUB_PATH"
      - name: Build log-sink nodes
        run: cargo build -p log-sink-file -p log-sink-alert -p log-sink-tcp
      - name: log-sink-file
        run: dora run examples/log-sink-file/dataflow.yml --uv --stop-after 15s
      - name: log-sink-alert
        run: dora run examples/log-sink-alert/dataflow.yml --uv --stop-after 15s
      - name: log-sink-tcp
        run: dora run examples/log-sink-tcp/dataflow.yml --uv --stop-after 15s

  service-action:
    name: Service / Action patterns (Rust-only)
    runs-on: ubuntu-latest
    needs: build-cli
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Download dora CLI
        uses: actions/download-artifact@v4
        with:
          name: dora-cli
          path: ./cli-bin
      - name: Install CLI to PATH
        run: |
          chmod +x ./cli-bin/dora
          echo "$PWD/cli-bin" >> "$GITHUB_PATH"
      - name: Build service / action example nodes
        run: >
          cargo build
          -p service-example-client
          -p service-example-server
          -p action-example-client
          -p action-example-server
      - name: service-example
        run: dora run examples/service-example/dataflow.yml --stop-after 15s
      - name: action-example
        run: dora run examples/action-example/dataflow.yml --stop-after 20s

  streaming:
    name: Streaming example (Python)
    runs-on: ubuntu-latest
    needs: build-cli
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python venv
        # Required because prompt_source.py / generator.py / sink.py are
        # Python nodes. Mirrors the ci.yml Python setup.
        run: |
          uv venv --seed -p 3.12
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          source .venv/bin/activate
          uv pip install pyarrow
          uv pip install -e apis/python/node
      - name: Download dora CLI
        uses: actions/download-artifact@v4
        with:
          name: dora-cli
          path: ./cli-bin
      - name: Install CLI to PATH
        run: |
          chmod +x ./cli-bin/dora
          echo "$PWD/cli-bin" >> "$GITHUB_PATH"
      - name: streaming-example
        run: dora run examples/streaming-example/dataflow.yml --uv --stop-after 15s

  record-replay:
    name: Record/replay round-trip
    runs-on: ubuntu-latest
    needs: build-cli
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Download dora CLI
        uses: actions/download-artifact@v4
        with:
          name: dora-cli
          path: ./cli-bin
      - name: Install CLI to PATH
        run: |
          chmod +x ./cli-bin/dora
          echo "$PWD/cli-bin" >> "$GITHUB_PATH"
      - name: Build rust-dataflow example nodes
        run: >
          cargo build
          -p rust-dataflow-example-node
          -p rust-dataflow-example-status-node
          -p rust-dataflow-example-sink
      - name: Record rust-dataflow
        run: |
          # `dora record <yaml>` instruments the dataflow and runs it;
          # recording written to `recording_<timestamp>.adorec`.
          timeout 20s dora record examples/rust-dataflow/dataflow.yml -o run.adorec || true
          test -f run.adorec || { echo "record did not produce run.adorec"; exit 1; }
          echo "recording size: $(wc -c < run.adorec) bytes"
      - name: Replay
        run: dora replay run.adorec

  cluster-smoke:
    # Smoke-tests the cluster lifecycle commands that don't require SSH:
    # `dora cluster status` and `dora cluster down`. (`dora cluster up`
    # needs SSH to each machine in cluster.yml — out of scope for a
    # single-runner smoke; needs dedicated infra.)
    #
    # Strategy: use `dora up` to launch a local coordinator+daemon, then
    # exercise the cluster CLI against it. Run a real dataflow to prove
    # the cluster can execute work. Tear down with `dora cluster down`.
    name: Cluster lifecycle smoke
    runs-on: ubuntu-latest
    needs: build-cli
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Download dora CLI
        uses: actions/download-artifact@v4
        with:
          name: dora-cli
          path: ./cli-bin
      - name: Install CLI to PATH
        run: |
          chmod +x ./cli-bin/dora
          echo "$PWD/cli-bin" >> "$GITHUB_PATH"
      - name: Build rust-dataflow example nodes
        run: >
          cargo build
          -p rust-dataflow-example-node
          -p rust-dataflow-example-status-node
          -p rust-dataflow-example-sink
      - name: Start local cluster (coordinator + daemon)
        run: |
          dora up
          sleep 2
      - name: cluster status shows at least 1 daemon
        run: |
          out=$(dora cluster status)
          echo "$out"
          echo "$out" | grep -q 'DAEMON ID' || { echo "ERROR: status output missing header"; exit 1; }
          # At least one non-header line = at least one daemon row
          daemon_lines=$(echo "$out" | grep -E '^[0-9a-f]{8}-' | wc -l)
          test "$daemon_lines" -ge 1 || { echo "ERROR: no daemons listed"; exit 1; }
          echo "$out" | grep -q 'Active dataflows:' || { echo "ERROR: missing dataflow summary"; exit 1; }
      - name: Run a dataflow through the cluster
        run: dora run examples/rust-dataflow/dataflow.yml --stop-after 10s
      - name: cluster down tears everything down cleanly
        run: |
          dora cluster down
          sleep 1
          # Verify coordinator is actually gone: cluster status must fail.
          if dora cluster status 2>/dev/null; then
            echo "ERROR: cluster status succeeded after 'cluster down'"
            exit 1
          fi
          # Verify no leftover processes (race-tolerant). The actual
          # invocations are `dora daemon --quiet` / `dora coordinator --quiet`
          # — a single `dora` binary with subcommands, not separate
          # `dora-daemon`/`dora-coordinator` binaries. Match the real
          # command lines.
          sleep 1
          if pgrep -fa 'dora (daemon|coordinator)' > /dev/null; then
            echo "ERROR: leftover dora processes after cluster down:"
            pgrep -fa 'dora (daemon|coordinator)'
            exit 1
          fi

  file-issue-on-failure:
    name: File issue on nightly failure
    runs-on: ubuntu-latest
    needs: [build-cli, smoke-suite, log-sinks, service-action, streaming, record-replay, cluster-smoke]
    # `always() && contains(needs.*.result, 'failure')` covers both direct
    # failures and the case where build-cli fails and downstream jobs get
    # skipped (plain `failure()` would miss the skipped-cascade case).
    if: always() && contains(needs.*.result, 'failure') && github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Create or update regression issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Find any open nightly-regression issue. If one exists, append
          # a comment with today's failure. Otherwise open a fresh issue.
          # Prevents issue spam when nightly is red for multiple days.
          DATE=$(date -u +%Y-%m-%d)
          EXISTING=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --label nightly-regression \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          COMMENT_BODY=$(cat <<EOF
          Another failure on $DATE.

          Run: $RUN_URL
          Commit: $COMMIT_SHA

          Reproduce locally:
          \`\`\`
          cargo test -p dora-examples --test example-smoke -- --test-threads=1
          \`\`\`
          EOF
          )

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue comment "$EXISTING" --repo "$REPO" --body "$COMMENT_BODY"
          else
            echo "Opening new nightly-regression issue"
            ISSUE_BODY=$(cat <<EOF
          Nightly regression suite failed on $DATE.

          Run: $RUN_URL
          Commit: $COMMIT_SHA

          Jobs:
          - smoke-suite
          - log-sinks
          - service-action
          - streaming
          - record-replay
          - cluster-smoke

          See the run for per-job status and logs. Subsequent failures
          will comment on this issue instead of opening new ones. Close
          this issue when the regression is fixed.

          Reproduce locally:
          \`\`\`
          cargo test -p dora-examples --test example-smoke -- --test-threads=1
          \`\`\`
          EOF
            )
            gh issue create \
              --repo "$REPO" \
              --title "Nightly regression since $DATE" \
              --body "$ISSUE_BODY" \
              --label nightly-regression
          fi
