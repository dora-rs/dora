name: pip-release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          # - runner: ubuntu-22.04
          #   target: s390x
          # - runner: ubuntu-22.04
          #   target: ppc64le
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --zig -m ${{ matrix.repository.path }}/Cargo.toml
          sccache: false
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.repository.name }}-linux-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter -m ${{ matrix.repository.path }}/Cargo.toml
          sccache: false
          manylinux: musllinux_1_2
          # working-directory: ${{ matrix.repository.path }}
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.repository.name }}-musllinux-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter -m ${{ matrix.repository.path }}/Cargo.toml
          sccache: false
          # working-directory: ${{ matrix.repository.path }}
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.repository.name }}-windows-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter -m ${{ matrix.repository.path }}/Cargo.toml
          sccache: false
          # working-directory: ${{ matrix.repository.path }}
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.repository.name }}-macos-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v6
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
