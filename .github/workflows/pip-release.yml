name: pip-release

# Triggers: release (publish to PyPI), workflow_dispatch (manual),
# push to main (post-merge verification), and push to Trunk Merge
# Queue's batched branches. Building 24 wheels per PR push was
# wasteful — now we build once per merge-queue batch (up to 5 PRs),
# matching the expensive-job gating in .github/workflows/ci.yml.
#
# No `paths:` filter: pip-release is a required merge condition,
# so the check must always be produced on merge-queue branches. A
# paths filter would cause Trunk to wait forever on batches that
# don't touch Python/CLI.
on:
  release:
    types:
      - "published"
  workflow_dispatch:
  push:
    branches:
      - main
      - "trunk-merge/**"

env:
  RUST_VERSION: "1.92.0"
  RUST_TOOLCHAIN_DIR: "1.92.0-x86_64-unknown-linux-gnu"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: write

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          # - runner: ubuntu-22.04
          # target: s390x
          # - runner: ubuntu-22.04
          # target: ppc64le
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - run: rustup default ${{ env.RUST_VERSION }}
      - run: rustup update ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-provider: buildjet
          # only save caches for `main` branch
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --zig
          manylinux: manylinux_2_28
          working-directory: ${{ matrix.repository.path }}
          before-script-linux: |
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libatomic1-i386-cross libatomic1-armhf-cross
            mkdir -p $HOME/.rustup/toolchains/${{ env.RUST_TOOLCHAIN_DIR }}/lib/rustlib/i686-unknown-linux-gnu/lib/
            ln -s /usr/i686-linux-gnu/lib/libatomic.so.1 $HOME/.rustup/toolchains/${{ env.RUST_TOOLCHAIN_DIR }}/lib/rustlib/i686-unknown-linux-gnu/lib/libatomic.so
            ln -s /usr/i686-linux-gnu/lib/libatomic.so.1 $HOME/.rustup/toolchains/${{ env.RUST_TOOLCHAIN_DIR }}/lib/rustlib/i686-unknown-linux-gnu/lib/libatomic.so.1
            ln -s /usr/i686-linux-gnu/lib/libatomic.so.1 /opt/hostedtoolcache/Python/3.8.18/x64/lib/libatomic.so.1
            mkdir -p $HOME/.rustup/toolchains/${{ env.RUST_TOOLCHAIN_DIR }}/lib/rustlib/armv7-unknown-linux-gnueabihf/lib/
            ln -s /usr/arm-linux-gnueabihf/lib/libatomic.so.1 $HOME/.rustup/toolchains/${{ env.RUST_TOOLCHAIN_DIR }}/lib/rustlib/armv7-unknown-linux-gnueabihf/lib/libatomic.so
      - name: Upload wheels
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repository.name }}-linux-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "false"
          manylinux: musllinux_1_2
          working-directory: ${{ matrix.repository.path }}

      - name: Upload wheels
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repository.name }}-musllinux-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  musleabi:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          [
            {
              target: "armv7-unknown-linux-musleabihf",
              image_tag: "armv7-musleabihf",
            },
          ]
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    container:
      image: docker://messense/rust-musl-cross:${{ matrix.platform.image_tag }}
      env:
        CFLAGS_armv7_unknown_linux_musleabihf: "-mfpu=vfpv3-d16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: auto
          container: off
          args: --release -o dist
          working-directory: ${{ matrix.repository.path }}
      - name: Upload wheels
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repository.name }}-musllinux-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-latest
            target: x64
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i 3.8
          sccache: "true"
          working-directory: ${{ matrix.repository.path }}
      - name: Upload wheels
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repository.name }}-windows-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-15
            target: aarch64
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i 3.8
          working-directory: ${{ matrix.repository.path }}
      - name: Upload wheels
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repository.name }}-macos-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist

  sdist:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: ${{ matrix.repository.path }}
      - name: Upload sdist
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repository.name }}-sdist
          path: ${{ matrix.repository.path }}/dist

  # Single aggregator check the merge queue can gate on. Listing each
  # matrix expansion in the queue's required-checks config is fragile
  # (~24 names with generated suffixes); this one job fails if any
  # build job failed and succeeds only when all matrix jobs succeeded.
  pip-release-all-green:
    name: pip-release all green
    runs-on: ubuntu-22.04
    needs: [linux, musllinux, musleabi, windows, macos, sdist]
    if: always()
    steps:
      - name: Verify all build jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more pip-release build jobs failed or were cancelled."
            exit 1
          fi

  release:
    name: Release
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' && startsWith(github.ref, 'refs/tags/')
    needs: [linux, musllinux, musleabi, windows, macos, sdist]
    strategy:
      fail-fast: false
      matrix:
        repository:
          - path: apis/python/node
            name: dora-node-api
          - path: binaries/cli
            name: dora-rs-cli
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_PASS }}
        with:
          command: upload
          args: --non-interactive --skip-existing ${{ matrix.repository.name }}-*/*
