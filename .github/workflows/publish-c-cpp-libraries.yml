name: Publish C/C++ Libraries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-c-cpp-libraries:
    name: Build C/C++ Libraries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Reuse Rust cache from main branch (read-only)
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build all C/C++ libraries
        shell: bash
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          fi
          $BUILD_CMD build --release --target ${{ matrix.target }} \
            -p dora-node-api-c \
            -p dora-operator-api-c \
            -p dora-node-api-cxx \
            -p dora-operator-api-cxx

      - name: Package C libraries (Unix)
        if: runner.os != 'Windows'
        run: |
          PREFIX="dora-c-libraries-${{ matrix.target }}"
          mkdir -p "$PREFIX/include" "$PREFIX/lib"

          cp target/${{ matrix.target }}/release/libdora_node_api_c.a "$PREFIX/lib/"
          cp target/${{ matrix.target }}/release/libdora_operator_api_c.a "$PREFIX/lib/"

          cp apis/c/node/node_api.h "$PREFIX/include/"
          cp apis/c/operator/operator_api.h "$PREFIX/include/"
          cp apis/c/operator/operator_types.h "$PREFIX/include/"

          tar czf "$PREFIX.tar.gz" "$PREFIX"

      - name: Package C++ libraries (Unix)
        if: runner.os != 'Windows'
        run: |
          PREFIX="dora-cpp-libraries-${{ matrix.target }}"
          mkdir -p "$PREFIX/include" "$PREFIX/lib" "$PREFIX/src"

          cp target/${{ matrix.target }}/release/libdora_node_api_cxx.a "$PREFIX/lib/"
          cp target/${{ matrix.target }}/release/libdora_operator_api_cxx.a "$PREFIX/lib/"

          # cxxbridge output may be at target/cxxbridge/ or target/<target>/cxxbridge/
          CXX_BRIDGE=$(find target -path "*/cxxbridge/dora-node-api-cxx/src/lib.rs.h" -print -quit | xargs dirname)

          # Bridge headers
          cp "$CXX_BRIDGE/lib.rs.h" "$PREFIX/include/dora-node-api.h"
          cp "${CXX_BRIDGE/node/operator}/lib.rs.h" "$PREFIX/include/dora-operator-api.h"

          # Bridge source files (users must compile these alongside their code)
          cp "$CXX_BRIDGE/lib.rs.cc" "$PREFIX/src/dora-node-api.cc"
          cp "${CXX_BRIDGE/node/operator}/lib.rs.cc" "$PREFIX/src/dora-operator-api.cc"

          tar czf "$PREFIX.tar.gz" "$PREFIX"

      - name: Package C libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = "dora-c-libraries-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$prefix/include", "$prefix/lib"

          Copy-Item "target/${{ matrix.target }}/release/dora_node_api_c.lib" "$prefix/lib/"
          Copy-Item "target/${{ matrix.target }}/release/dora_operator_api_c.lib" "$prefix/lib/"

          Copy-Item "apis/c/node/node_api.h" "$prefix/include/"
          Copy-Item "apis/c/operator/operator_api.h" "$prefix/include/"
          Copy-Item "apis/c/operator/operator_types.h" "$prefix/include/"

          Compress-Archive -Path "$prefix" -DestinationPath "$prefix.zip"

      - name: Package C++ libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = "dora-cpp-libraries-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$prefix/include", "$prefix/lib", "$prefix/src"

          Copy-Item "target/${{ matrix.target }}/release/dora_node_api_cxx.lib" "$prefix/lib/"
          Copy-Item "target/${{ matrix.target }}/release/dora_operator_api_cxx.lib" "$prefix/lib/"

          # cxxbridge output may be at target/cxxbridge/ or target/<target>/cxxbridge/
          $nodeDir = Get-ChildItem -Path target -Recurse -Filter "lib.rs.h" | Where-Object { $_.FullName -match "dora-node-api-cxx" } | Select-Object -First 1 -ExpandProperty DirectoryName
          $operatorDir = Get-ChildItem -Path target -Recurse -Filter "lib.rs.h" | Where-Object { $_.FullName -match "dora-operator-api-cxx" } | Select-Object -First 1 -ExpandProperty DirectoryName

          Copy-Item "$nodeDir/lib.rs.h" "$prefix/include/dora-node-api.h"
          Copy-Item "$operatorDir/lib.rs.h" "$prefix/include/dora-operator-api.h"

          Copy-Item "$nodeDir/lib.rs.cc" "$prefix/src/dora-node-api.cc"
          Copy-Item "$operatorDir/lib.rs.cc" "$prefix/src/dora-operator-api.cc"

          Compress-Archive -Path "$prefix" -DestinationPath "$prefix.zip"

      - name: Upload C libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-c-libraries-${{ matrix.target }}
          path: dora-c-libraries-${{ matrix.target }}.*

      - name: Upload C++ libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-cpp-libraries-${{ matrix.target }}
          path: dora-cpp-libraries-${{ matrix.target }}.*

  publish-to-release:
    name: Publish to GitHub Release
    needs: build-c-cpp-libraries
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Artifacts to upload:"
          ls -la artifacts/
          gh release upload "${{ github.event.release.tag_name }}" artifacts/* --clobber --repo "${{ github.repository }}"
