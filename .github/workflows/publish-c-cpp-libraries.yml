name: Publish C/C++ Libraries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-c-cpp-libraries:
    name: Build C/C++ Libraries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Reuse Rust cache from main branch (read-only)
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build all C/C++ libraries
        shell: bash
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          fi
          $BUILD_CMD build --release --target ${{ matrix.target }} \
            -p dora-node-api-c \
            -p dora-operator-api-c \
            -p dora-node-api-cxx \
            -p dora-operator-api-cxx

      - name: Generate C++ bridge files
        shell: bash
        run: |
          # Bridge files (.h/.cc) are platform-independent, so always generate
          # with host cargo to ensure they're available on the host filesystem
          # (cross builds inside Docker and may not expose cxxbridge output).
          cargo build -p dora-node-api-cxx -p dora-operator-api-cxx

      # Staging is delegated to `xtask stage`, which copies the static
      # library, headers, and the cmake config files (generated by each
      # crate's build.rs) into a find_package-ready prefix layout. This
      # replaces the per-platform shell/pwsh copy blocks the workflow
      # used to carry and fixes the Windows lib-staging problem flagged
      # in #1763 — staging happens after cargo finishes the lib, never
      # during build.rs (rescue of #1763 / #1756).
      # `--target` is what guarantees the staged cmake config encodes
      # the archive's triple, not the host's. Critical for cross-builds
      # (e.g., aarch64-unknown-linux-gnu) where the cxxbridge build.rs
      # may run on the host and bake in the wrong DORA_BUILT_TARGET.
      # See `xtask/src/main.rs::rewrite_built_target`.
      - name: Stage C libraries
        shell: bash
        run: |
          PREFIX="dora-c-libraries-${{ matrix.target }}"
          cargo run -p xtask -- stage dora-node-api-c "target/${{ matrix.target }}/release" "$PREFIX" --target "${{ matrix.target }}"
          cargo run -p xtask -- stage dora-operator-api-c "target/${{ matrix.target }}/release" "$PREFIX" --target "${{ matrix.target }}"

      - name: Stage C++ libraries
        shell: bash
        run: |
          PREFIX="dora-cpp-libraries-${{ matrix.target }}"
          cargo run -p xtask -- stage dora-node-api-cxx "target/${{ matrix.target }}/release" "$PREFIX" --target "${{ matrix.target }}"
          cargo run -p xtask -- stage dora-operator-api-cxx "target/${{ matrix.target }}/release" "$PREFIX" --target "${{ matrix.target }}"

      - name: Archive C libraries (Unix)
        if: runner.os != 'Windows'
        run: tar czf "dora-c-libraries-${{ matrix.target }}.tar.gz" "dora-c-libraries-${{ matrix.target }}"

      - name: Archive C++ libraries (Unix)
        if: runner.os != 'Windows'
        run: tar czf "dora-cpp-libraries-${{ matrix.target }}.tar.gz" "dora-cpp-libraries-${{ matrix.target }}"

      - name: Archive C libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dora-c-libraries-${{ matrix.target }}" -DestinationPath "dora-c-libraries-${{ matrix.target }}.zip"

      - name: Archive C++ libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dora-cpp-libraries-${{ matrix.target }}" -DestinationPath "dora-cpp-libraries-${{ matrix.target }}.zip"

      - name: Upload C libraries artifact
        uses: actions/upload-artifact@v7
        with:
          name: dora-c-libraries-${{ matrix.target }}
          path: dora-c-libraries-${{ matrix.target }}.*

      - name: Upload C++ libraries artifact
        uses: actions/upload-artifact@v7
        with:
          name: dora-cpp-libraries-${{ matrix.target }}
          path: dora-cpp-libraries-${{ matrix.target }}.*

  publish-to-release:
    name: Publish to GitHub Release
    needs: build-c-cpp-libraries
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          echo "Artifacts to upload:"
          ls -la artifacts/
          gh release upload "$RELEASE_TAG" artifacts/* --clobber --repo "$REPO"
