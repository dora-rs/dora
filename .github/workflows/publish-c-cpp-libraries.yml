name: Publish C/C++ Libraries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-c-cpp-libraries:
    name: Build C/C++ Libraries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Reuse Rust cache from main branch (read-only)
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build all C/C++ libraries
        shell: bash
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          fi
          $BUILD_CMD build --release --target ${{ matrix.target }} \
            -p dora-node-api-c \
            -p dora-operator-api-c \
            -p dora-node-api-cxx \
            -p dora-operator-api-cxx

      - name: Generate C++ bridge files
        shell: bash
        run: |
          # Bridge files (.h/.cc) are platform-independent, so always generate
          # with host cargo to ensure they're available on the host filesystem
          # (cross builds inside Docker and may not expose cxxbridge output).
          cargo build -p dora-node-api-cxx -p dora-operator-api-cxx

      - name: Stage and Package C libraries (Unix)
        if: runner.os != 'Windows'
        run: |     
          TARGET="${{ matrix.target }}"
          TARGET_DIR="target/$TARGET/release"
          C_PREFIX="dora-c-libraries-$TARGET"

          cargo run -p xtask -- stage dora-node-api-c "$TARGET_DIR" "$C_PREFIX"
          
          cargo run -p xtask -- stage dora-operator-api-c "$TARGET_DIR" "$C_PREFIX"
          
          tar czf "$C_PREFIX.tar.gz" "$C_PREFIX"

      - name: Package C++ libraries (Unix)
        if: runner.os != 'Windows'
        run: |
          TARGET="${{ matrix.target }}"
          TARGET_DIR="target/$TARGET/release"
          CPP_PREFIX="dora-cpp-libraries-$TARGET"

          cargo run -p xtask -- stage dora-node-api-cxx "$TARGET_DIR" "$CPP_PREFIX"
          
          cargo run -p xtask -- stage dora-operator-api-cxx "$TARGET_DIR" "$CPP_PREFIX"
          
          tar czf "$CPP_PREFIX.tar.gz" "$CPP_PREFIX"

      - name: Stage and Package C libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $targetDir = "target/$target/release"
          $cPrefix = "dora-c-libraries-$target"

          cargo run -p xtask -- stage dora-node-api-c $targetDir $cPrefix
          
          cargo run -p xtask -- stage dora-operator-api-c $targetDir $cPrefix
          
          Compress-Archive -Path $cPrefix -DestinationPath "$cPrefix.zip"

      - name: Package C++ libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $targetDir = "target/$target/release"
          $cppPrefix = "dora-cpp-libraries-$target"

          cargo run -p xtask -- stage dora-node-api-cxx $targetDir $cppPrefix
          
          cargo run -p xtask -- stage dora-operator-api-cxx $targetDir $cppPrefix
          
          Compress-Archive -Path $cppPrefix -DestinationPath "$cppPrefix.zip"

      - name: Upload C libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-c-libraries-${{ matrix.target }}
          path: dora-c-libraries-${{ matrix.target }}.*

      - name: Upload C++ libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-cpp-libraries-${{ matrix.target }}
          path: dora-cpp-libraries-${{ matrix.target }}.*

  publish-to-release:
    name: Publish to GitHub Release
    needs: build-c-cpp-libraries
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          echo "Artifacts to upload:"
          ls -la artifacts/
          gh release upload "$RELEASE_TAG" artifacts/* --clobber --repo "$REPO"
