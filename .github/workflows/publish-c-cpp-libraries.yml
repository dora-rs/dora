name: Publish C/C++ Libraries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-c-cpp-libraries:
    name: Build C/C++ Libraries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Reuse Rust cache from main branch (read-only)
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build all C/C++ libraries
        shell: bash
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          fi
          $BUILD_CMD build --release --target ${{ matrix.target }} \
            -p dora-node-api-c \
            -p dora-operator-api-c \
            -p dora-node-api-cxx \
            -p dora-operator-api-cxx

      - name: Generate C++ bridge files
        shell: bash
        run: |
          # Bridge files (.h/.cc) are platform-independent, so always generate
          # with host cargo to ensure they're available on the host filesystem
          # (cross builds inside Docker and may not expose cxxbridge output).
          cargo build -p dora-node-api-cxx -p dora-operator-api-cxx

      - name: Stage and Package C libraries (Unix)
        if: runner.os != 'Windows'
        run: |     
          # Stage node API files
          ./scripts/c-cpp-libraries/stage-c-node.sh \
            target/${{ matrix.target }}/release \
            dora-c-libraries-${{ matrix.target }}
          
          # Add operator API files
          cp apis/c/operator/operator_api.h dora-c-libraries-${{ matrix.target }}/include/
          cp apis/c/operator/operator_types.h dora-c-libraries-${{ matrix.target }}/include/
          cp target/${{ matrix.target }}/release/libdora_operator_api_c.a dora-c-libraries-${{ matrix.target }}/lib/
          
          # Package
          tar czf dora-c-libraries-${{ matrix.target }}.tar.gz dora-c-libraries-${{ matrix.target }}

      - name: Package C++ libraries (Unix)
        if: runner.os != 'Windows'
        run: |
          PREFIX="dora-cpp-libraries-${{ matrix.target }}"
          mkdir -p "$PREFIX/include" "$PREFIX/lib" "$PREFIX/src"

          cp target/${{ matrix.target }}/release/libdora_node_api_cxx.a "$PREFIX/lib/"
          cp target/${{ matrix.target }}/release/libdora_operator_api_cxx.a "$PREFIX/lib/"

          # Bridge headers (generated by host cargo build)
          cp target/cxxbridge/dora-node-api-cxx/src/lib.rs.h "$PREFIX/include/dora-node-api.h"
          cp target/cxxbridge/dora-operator-api-cxx/src/lib.rs.h "$PREFIX/include/dora-operator-api.h"

          # Bridge source files (users must compile these alongside their code)
          cp target/cxxbridge/dora-node-api-cxx/src/lib.rs.cc "$PREFIX/src/dora-node-api.cc"
          cp target/cxxbridge/dora-operator-api-cxx/src/lib.rs.cc "$PREFIX/src/dora-operator-api.cc"

          tar czf "$PREFIX.tar.gz" "$PREFIX"

      - name: Stage and Package C libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Stage node API files
          ./scripts/c-cpp-libraries/stage-c-node.ps1 `
            -TargetDir target/${{ matrix.target }}/release `
            -Prefix dora-c-libraries-${{ matrix.target }}
          
          # Add operator API files
          Copy-Item "apis/c/operator/operator_api.h" "dora-c-libraries-${{ matrix.target }}/include/"
          Copy-Item "apis/c/operator/operator_types.h" "dora-c-libraries-${{ matrix.target }}/include/"
          Copy-Item "target/${{ matrix.target }}/release/dora_operator_api_c.lib" "dora-c-libraries-${{ matrix.target }}/lib/"
          
          # Package
          Compress-Archive -Path "dora-c-libraries-${{ matrix.target }}" -DestinationPath "dora-c-libraries-${{ matrix.target }}.zip"

      - name: Package C++ libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = "dora-cpp-libraries-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$prefix/include", "$prefix/lib", "$prefix/src"

          Copy-Item "target/${{ matrix.target }}/release/dora_node_api_cxx.lib" "$prefix/lib/"
          Copy-Item "target/${{ matrix.target }}/release/dora_operator_api_cxx.lib" "$prefix/lib/"

          Copy-Item "target/cxxbridge/dora-node-api-cxx/src/lib.rs.h" "$prefix/include/dora-node-api.h"
          Copy-Item "target/cxxbridge/dora-operator-api-cxx/src/lib.rs.h" "$prefix/include/dora-operator-api.h"

          Copy-Item "target/cxxbridge/dora-node-api-cxx/src/lib.rs.cc" "$prefix/src/dora-node-api.cc"
          Copy-Item "target/cxxbridge/dora-operator-api-cxx/src/lib.rs.cc" "$prefix/src/dora-operator-api.cc"

          Compress-Archive -Path "$prefix" -DestinationPath "$prefix.zip"

      - name: Upload C libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-c-libraries-${{ matrix.target }}
          path: dora-c-libraries-${{ matrix.target }}.*

      - name: Upload C++ libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-cpp-libraries-${{ matrix.target }}
          path: dora-cpp-libraries-${{ matrix.target }}.*

  publish-to-release:
    name: Publish to GitHub Release
    needs: build-c-cpp-libraries
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          echo "Artifacts to upload:"
          ls -la artifacts/
          gh release upload "$RELEASE_TAG" artifacts/* --clobber --repo "$REPO"
