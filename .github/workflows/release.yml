name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  # Pin Rust to 1.92 until static_init (zenoh-shm dep) is fixed for 1.94+
  RUST_VERSION: "1.92.0"

jobs:
  # ── 1. Publish Rust crates to crates.io ──────────────────────────────────
  publish-crates:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Topological order: leaves first, binaries last.
          # Skips Python crates (published to PyPI separately).
          CRATES=(
            adora-message
            adora-arrow-convert
            shared-memory-server
            adora-coordinator-store
            adora-core
            adora-recording
            adora-download
            adora-tracing
            adora-metrics
            adora-operator-api-types
            adora-operator-api-macros
            adora-operator-api
            adora-node-api
            adora-node-api-c
            adora-operator-api-c
            adora-node-api-cxx
            adora-operator-api-cxx
            adora-ros2-bridge-msg-gen
            adora-ros2-bridge
            adora-ros2-bridge-arrow
            adora-ros2-bridge-node
            adora-runtime
            adora-coordinator
            adora-daemon
            adora-record-node
            adora-replay-node
            adora-cli
          )
          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            cargo publish -p "$crate" --no-verify || echo "::warning::$crate skipped (already published?)"
            echo "::endgroup::"
            sleep 5  # crates.io index propagation
          done

  # ── 2. Build Python wheels ────────────────────────────────────────────────
  # Modeled after dora-rs/dora pip-release.yml:
  #   - Linux: use --zig for cross-compilation (handles vendored-openssl)
  #   - macOS: aarch64 only (x86_64 cross-compile has OpenSSL issues)
  #   - Windows: x64 only
  #   - working-directory instead of -m flag
  build-wheels:
    name: Build wheels (${{ matrix.platform.os }}-${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04,  target: x86_64,  os: linux,   zig: true }
          - { runner: ubuntu-22.04,  target: aarch64, os: linux,   zig: true }
          - { runner: macos-14,      target: aarch64, os: macos,   zig: false }
          - { runner: windows-2022,  target: x64,     os: windows, zig: false }
        repository:
          - { path: apis/python/node, name: adora-rs }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build wheels (zig)
        if: matrix.platform.zig
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --zig
          manylinux: manylinux_2_28
          working-directory: ${{ matrix.repository.path }}
      - name: Build wheels (native)
        if: ${{ !matrix.platform.zig }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: ${{ matrix.repository.path }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repository.name }}-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist/

  # ── 3. Publish wheels to PyPI ─────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adora-rs
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: adora-rs*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── 4. Build CLI binaries ─────────────────────────────────────────────────
  dist:
    name: Build CLI binaries (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,      runner: macos-14     }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-22.04 }
          - { target: x86_64-pc-windows-msvc,    runner: windows-2022 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build CLI for ${{ matrix.target }}
        run: cargo build -p adora-cli --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/adora artifacts/adora
          tar czf artifacts/adora-${{ matrix.target }}.tar.gz -C artifacts adora
      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "target/${{ matrix.target }}/release/adora.exe" "artifacts/adora.exe"
          Compress-Archive -Path "artifacts/adora.exe" -DestinationPath "artifacts/adora-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: artifacts/adora-*.*

  # ── 5. Create GitHub Release with changelog ───────────────────────────────
  github-release:
    name: GitHub Release
    needs: [publish-crates, publish-pypi, dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: release-assets/
      - name: Copy install scripts to release assets
        run: |
          cp install.sh release-assets/adora-cli-installer.sh
          cp install.ps1 release-assets/adora-cli-installer.ps1
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          files: release-assets/*
