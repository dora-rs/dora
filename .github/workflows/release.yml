name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      # Pre-release tags (e.g. v1.0.0-rc.2). The bare pattern above does not
      # match a `-rc.N` suffix, which silently skipped the v1.0.0 rc releases.
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.97.1"

jobs:
  # ── 1. Publish Rust crates to crates.io ──────────────────────────────────
  publish-crates:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Topological order: leaves first, binaries last. `cargo publish`
          # resolves path deps against crates.io, so every workspace dep of a
          # crate must be published before it — including optional deps
          # (dora-ros2-bridge before dora-node-api-cxx) and dev-deps, which
          # keep their version requirement when packaged (dora-daemon and
          # dora-cli before dora-ros2-bridge, which dev-depends on both).
          # Excludes `publish = false` binaries (dora-record-node,
          # dora-replay-node, dora-ros2-bridge-node — delivered via the CLI)
          # and the PyPI-only dora-node-api-python.
          # Keep in sync with .github/workflows/cargo-release.yml.
          CRATES=(
            dora-message
            dora-arrow-convert
            dora-coordinator-store
            dora-core
            dora-recording
            dora-download
            dora-tracing
            dora-metrics
            dora-hub-client
            dora-memory-pool
            dora-operator-api-types
            dora-operator-api-macros
            dora-operator-api
            dora-node-api
            dora-node-api-c
            dora-operator-api-c
            dora-coordinator
            dora-daemon
            dora-operator-api-python
            dora-runtime
            dora-cli
            dora-ros2-bridge-msg-gen
            dora-ros2-bridge
            dora-node-api-cxx
            dora-operator-api-cxx
            dora-ros2-bridge-arrow
          )
          # `cargo publish` blocks until the crate is available in the
          # index, so no propagation sleep is needed. Tolerate only
          # already-published versions (idempotent re-runs); any other
          # failure must fail the job instead of silently producing a
          # partial release.
          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            if ! output=$(cargo publish -p "$crate" --no-verify 2>&1); then
              echo "$output"
              if echo "$output" | grep -qi "already uploaded\|is already uploaded\|already exists"; then
                echo "::warning::$crate already published, skipping"
              else
                echo "::error::failed to publish $crate"
                exit 1
              fi
            else
              echo "$output" | tail -5
            fi
            echo "::endgroup::"
          done

  # ── 2. Build Python wheels ────────────────────────────────────────────────
  # Modeled after dora-rs/dora pip-release.yml:
  #   - Linux: use --zig for cross-compilation (handles vendored-openssl)
  #   - macOS: aarch64 only (x86_64 cross-compile has OpenSSL issues)
  #   - Windows: x64 only
  #   - working-directory instead of -m flag
  build-wheels:
    name: Build wheels (${{ matrix.platform.os }}-${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04,  target: x86_64,  os: linux,   zig: true }
          - { runner: ubuntu-22.04,  target: aarch64, os: linux,   zig: true }
          - { runner: macos-14,      target: aarch64, os: macos,   zig: false }
          - { runner: windows-2022,  target: x64,     os: windows, zig: false }
        repository:
          - { path: apis/python/node, name: dora-rs }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build wheels (zig)
        if: matrix.platform.zig
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --zig
          manylinux: manylinux_2_28
          working-directory: ${{ matrix.repository.path }}
      - name: Build wheels (native)
        if: ${{ !matrix.platform.zig }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: ${{ matrix.repository.path }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.repository.name }}-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: ${{ matrix.repository.path }}/dist/

  # ── 3. Publish wheels to PyPI ─────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dora-rs
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dora-rs*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── 4. Build CLI binaries ─────────────────────────────────────────────────
  dist:
    name: Build CLI binaries (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,      runner: macos-14     }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-22.04 }
          - { target: x86_64-pc-windows-msvc,    runner: windows-2022 }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build CLI for ${{ matrix.target }}
        run: cargo build -p dora-cli --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package binary (unix)
        if: runner.os != 'Windows'
        # Asset name and nested layout must match what install.sh expects
        # (dora-cli-<target>.tar.gz containing dora-cli-<target>/dora), which
        # is also the layout of previously published releases.
        run: |
          mkdir -p artifacts/dora-cli-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/dora artifacts/dora-cli-${{ matrix.target }}/dora
          tar czf artifacts/dora-cli-${{ matrix.target }}.tar.gz -C artifacts dora-cli-${{ matrix.target }}
      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "target/${{ matrix.target }}/release/dora.exe" "artifacts/dora.exe"
          # Flat zip (dora.exe at archive root) named dora-cli-<target>.zip,
          # matching install.ps1 and previously published releases.
          Compress-Archive -Path "artifacts/dora.exe" -DestinationPath "artifacts/dora-cli-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: artifacts/dora-cli-*.*

  # ── 5. Create GitHub Release with changelog ───────────────────────────────
  github-release:
    name: GitHub Release
    needs: [publish-crates, publish-pypi, dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: release-assets/
      - name: Copy install scripts to release assets
        run: |
          cp install.sh release-assets/dora-cli-installer.sh
          cp install.ps1 release-assets/dora-cli-installer.ps1
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          files: release-assets/*
