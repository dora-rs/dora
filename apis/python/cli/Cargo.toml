[package]
name = "dora-cli-api-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
publish = false  # PyO3 cdylib, shipped via PyPI as `dora-rs-cli`, not crates.io

[features]
default = ["telemetry"]
telemetry = ["dora-runtime/telemetry"]

[dependencies]
dora-cli = { workspace = true, features = ["python"] }
dora-runtime = { workspace = true, features = ["tracing", "metrics", "python"] }
dora-download = { workspace = true }
dora-node-api = { workspace = true }
eyre = { workspace = true }
pyo3.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread"] }

[build-dependencies]
# Inherit the workspace dep so the `abi3-py311` feature (which the
# workspace adds via Cargo.toml) is picked up here too. A bare
# `pyo3-build-config = "0.28"` would silently drop that feature and
# re-trigger the "no abi3-py3* feature" build-script error on hosts
# with `PYO3_NO_PYTHON=1` set or no findable Python interpreter.
pyo3-build-config.workspace = true

[lib]
name = "dora_cli"
crate-type = ["cdylib"]
