[package]
version.workspace = true
name = "adora-node-api-python"
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme = "README.md"
description.workspace = true
license.workspace = true
repository.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["tracing", "metrics", "async"]
tracing = ["adora-node-api/tracing"]
metrics = ["adora-node-api/metrics"]
async = ["pyo3/experimental-async"]

[dependencies]
adora-node-api = { workspace = true }
adora-operator-api-python = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
pyo3.workspace = true
eyre = "0.6"
serde_json = "1"
serde_yaml = { workspace = true }
flume = "0.10.14"
arrow = { workspace = true, features = ["pyarrow"] }
pythonize = { workspace = true }
futures = "0.3.28"
adora-ros2-bridge-python = { workspace = true }
pyo3_special_method_derive = "0.4.3"
tokio = { version = "1.24.2", features = ["rt-multi-thread", "time", "macros"] }
tracing = "0.1.36"

[build-dependencies]
pyo3-build-config = "0.23"

[lib]
name = "adora"
crate-type = ["cdylib"]
