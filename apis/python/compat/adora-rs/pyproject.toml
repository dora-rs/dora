[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "adora-rs"
version = "0.3.0"
description = "Deprecated — renamed to dora-rs for 1.0. Install dora-rs instead."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.8"
authors = [{ name = "Yong He", email = "heyong4725@gmail.com" }]
keywords = ["dora", "dataflow", "robotics", "deprecated"]
classifiers = [
    "Development Status :: 7 - Inactive",
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "dora-rs>=1.0.0,<2.0.0",
]

[project.urls]
Homepage = "https://dora-rs.ai"
Repository = "https://github.com/dora-rs/dora"
"Migration guide" = "https://github.com/dora-rs/dora/blob/main/docs/migration-from-0.x.md"

[tool.setuptools.packages.find]
where = ["."]
include = ["adora_rs*"]
