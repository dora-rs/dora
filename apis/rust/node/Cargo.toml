[package]
name = "adora-node-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["tracing", "metrics"]
tracing = ["dep:adora-tracing"]
metrics = ["dep:adora-metrics"]

[dependencies]
adora-core = { workspace = true }
adora-message = { workspace = true }
shared-memory-server = { workspace = true }
eyre = "0.6.7"
serde_yaml = { workspace = true }
tracing = "0.1.33"
flume = "0.10.14"
bincode = "1.3.3"
shared_memory_extended = "0.13.0"
adora-tracing = { workspace = true, optional = true }
adora-metrics = { workspace = true, optional = true }
opentelemetry = { version = "0.23.0", optional = true }
arrow = { workspace = true }
futures = "0.3.28"
futures-concurrency = "7.3.0"
futures-timer = "3.0.2"
adora-arrow-convert = { workspace = true }
aligned-vec = "0.5.0"
serde_json = { version = "1.0.86", features = ["preserve_order"] }
tokio = { version = "1.24.2", features = ["rt-multi-thread", "time", "macros"] }
inquire = { version = "0.7.5", default-features = false, features = [
    "console",
] }
arrow-json = { workspace = true }
arrow-schema = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
colored = "3.0.0"
is-terminal = "0.4.16"
thiserror = { workspace = true }
