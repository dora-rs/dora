[package]
name = "adora-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
adora-node-api = { workspace = true, default-features = false }
adora-operator-api-python = { workspace = true, optional = true }
adora-operator-api-types = { workspace = true }
adora-core = { workspace = true }
adora-tracing = { workspace = true, optional = true }
adora-metrics = { workspace = true, optional = true }
adora-message = { workspace = true }
eyre = "0.6.8"
futures = "0.3.21"
futures-concurrency = "7.1.0"
libloading = "0.7.3"
serde_yaml = { workspace = true }
tokio = { version = "1.24.2", features = ["full"] }
tokio-stream = "0.1.8"
# pyo3-abi3 flag allow simpler linking. See: https://pyo3.rs/v0.13.2/building_and_distribution.html
pyo3 = { workspace = true, features = ["eyre", "abi3-py37"], optional = true }
tracing = "0.1.36"
adora-download = { workspace = true }
flume = "0.10.14"
tracing-opentelemetry = { version = "0.32.0", optional = true }
pythonize = { workspace = true, optional = true }
arrow = { workspace = true, features = ["ffi"] }
aligned-vec = "0.5.0"

[features]
default = ["tracing", "metrics"]
tracing = ["adora-tracing"]
telemetry = ["tracing", "tracing-opentelemetry"]
metrics = ["adora-metrics"]
python = ["pyo3", "adora-operator-api-python", "pythonize", "arrow/pyarrow"]
