[package]
name = "dora-runtime-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

# Python (PyO3) operator runtime backend. Loads a Python module's `Operator`
# class and runs it on the `dora-runtime-api` event loop. Shipped inside the
# Python wheel and invoked via `dora.start_runtime()`. This is the only runtime
# crate that links `pyo3`.

[dependencies]
dora-runtime-api = { workspace = true }
dora-node-api = { workspace = true, default-features = false }
dora-core = { workspace = true }
dora-download = { workspace = true }
dora-operator-api-python = { workspace = true }
dora-operator-api-types = { workspace = true }
dora-tracing = { workspace = true, optional = true }
arrow = { workspace = true, features = ["pyarrow"] }
# pyo3-abi3 flag allow simpler linking. See: https://pyo3.rs/v0.13.2/building_and_distribution.html
pyo3 = { workspace = true, features = ["eyre", "abi3-py311"] }
pythonize = { workspace = true }
eyre = { workspace = true }
flume = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-opentelemetry = { version = "0.33.0", optional = true }

[build-dependencies]
pyo3-build-config = { workspace = true }

[features]
default = ["tracing", "metrics"]
tracing = ["dora-runtime-api/tracing"]
metrics = ["dora-runtime-api/metrics"]
telemetry = ["tracing", "dep:dora-tracing", "dep:tracing-opentelemetry"]
