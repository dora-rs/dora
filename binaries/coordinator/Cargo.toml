[package]
name = "adora-coordinator"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["tracing"]
tracing = ["dep:adora-tracing"]
redb-backend = ["adora-coordinator-store/redb-backend"]

[dependencies]
eyre = "0.6.7"
futures = "0.3.21"
tokio = { version = "1.24.2", features = ["full"] }
tokio-stream = { version = "0.1.8", features = ["io-util", "net"] }
uuid = { version = "1.2.1" }
adora-core = { workspace = true, features = ["build"] }
tracing = "0.1.36"
adora-tracing = { workspace = true, optional = true }
futures-concurrency = "7.1.0"
serde = { version = "1.0.136", features = ["derive"] }
serde_json = "1.0.86"
petname = "2.0.2"
ctrlc = "3.2.5"
log = { version = "0.4.21", features = ["serde"] }
adora-message = { workspace = true }
adora-coordinator-store = { workspace = true }
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }
itertools = "0.14.0"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tokio-tungstenite = "0.28"
