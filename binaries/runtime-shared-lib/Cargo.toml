[package]
name = "dora-runtime-shared-lib"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

# Shared-library (C ABI) operator runtime backend. Loads `.so`/`.dll`/`.dylib`
# operators via `libloading` and runs them on the `dora-runtime-api` event loop.
# Shipped inside the `dora` CLI as the `dora runtime` subcommand.

[dependencies]
dora-runtime-api = { workspace = true }
dora-node-api = { workspace = true, default-features = false }
dora-core = { workspace = true }
dora-download = { workspace = true }
dora-operator-api-types = { workspace = true }
dora-tracing = { workspace = true, optional = true }
arrow = { workspace = true, features = ["ffi"] }
libloading = "0.9"
eyre = { workspace = true }
flume = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-opentelemetry = { version = "0.33.0", optional = true }

[features]
default = ["tracing", "metrics"]
tracing = ["dora-runtime-api/tracing"]
metrics = ["dora-runtime-api/metrics"]
telemetry = ["tracing", "dep:dora-tracing", "dep:tracing-opentelemetry"]
