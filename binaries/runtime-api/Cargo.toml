[package]
name = "dora-runtime-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

# Language-neutral runtime SDK: the operator event loop, the daemon/node
# harness, and the `OperatorRunner` backend trait. Per-language backends
# (`dora-runtime-shared-lib`, `dora-runtime-python`) build on top of this.

[dependencies]
dora-node-api = { workspace = true, default-features = false }
dora-core = { workspace = true }
dora-message = { workspace = true }
dora-tracing = { workspace = true, optional = true }
dora-metrics = { workspace = true, optional = true }
eyre = { workspace = true }
futures = { workspace = true }
futures-concurrency = "7.7.1"
serde_yaml = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-stream = "0.1.18"
tracing = { workspace = true }
flume = { workspace = true }

[dev-dependencies]
arrow = { workspace = true }

[features]
default = ["tracing", "metrics"]
tracing = ["dep:dora-tracing"]
metrics = ["dep:dora-metrics"]
