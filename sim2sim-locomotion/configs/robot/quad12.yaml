# quad12 — bundled simplified 12-DOF quadruped (Go2-like joint topology).
# Swap mjcf_path/urdf_path + these numbers to study a real robot.
name: quad12

# pkg:// resolves into the installed package's assets/ directory.
mjcf_path: pkg://quad12/quad12.xml
urdf_path: pkg://quad12/quad12.urdf

# Canonical joint order. Every adapter reports state / accepts torque in THIS order.
joint_names:
  - FL_hip
  - FL_thigh
  - FL_calf
  - FR_hip
  - FR_thigh
  - FR_calf
  - RL_hip
  - RL_thigh
  - RL_calf
  - RR_hip
  - RR_thigh
  - RR_calf

foot_names: [FL_foot, FR_foot, RL_foot, RR_foot]

# Nominal standing pose (hip, thigh, calf) repeated per leg.
default_joint_pos: [0.0, 0.8, -1.5,  0.0, 0.8, -1.5,  0.0, 0.8, -1.5,  0.0, 0.8, -1.5]

# PD gains (scalar broadcast to all 12 joints).
kp: [20.0]
kd: [0.5]

action_scale: 0.25
torque_limit: [40.0]
base_height_init: 0.40
