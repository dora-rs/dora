# lerobot_legs — simplified 12-DOF bipedal stand-in for the LeRobot Humanoid legs.
# Swap mjcf_path/urdf_path (and these numbers) for the real lerobot-humanoid-model
# assets to run a high-fidelity study.
name: lerobot_legs

mjcf_path: pkg://lerobot_legs/lerobot_legs.xml   # MuJoCo / mjlab / Genesis
urdf_path: pkg://lerobot_legs/lerobot_legs.urdf  # PyBullet (+ Isaac via URDF->USD)
# usd_path: <set to a pre-converted USD to skip Isaac's URDF importer>

# Canonical joint order — every adapter reports state / accepts torque in THIS order.
joint_names:
  - L_hip_yaw
  - L_hip_roll
  - L_hip_pitch
  - L_knee
  - L_ankle_pitch
  - L_ankle_roll
  - R_hip_yaw
  - R_hip_roll
  - R_hip_pitch
  - R_knee
  - R_ankle_pitch
  - R_ankle_roll

foot_names: [L_foot, R_foot]

# Nominal standing pose: slight crouch (hip_pitch back, knee bent, ankle comp).
#                 yaw  roll  hipP  knee  ankP  ankR
default_joint_pos: [0.0, 0.0, -0.2, 0.4, -0.2, 0.0,   0.0, 0.0, -0.2, 0.4, -0.2, 0.0]

# PD gains: hips/knees stiffer than ankles (per-joint vectors, length 12).
kp: [60, 60, 60, 60, 40, 40,   60, 60, 60, 60, 40, 40]
kd: [2.0, 2.0, 2.0, 2.0, 1.0, 1.0,   2.0, 2.0, 2.0, 2.0, 1.0, 1.0]

action_scale: 0.5
torque_limit: [80, 80, 80, 80, 60, 60,   80, 80, 80, 80, 60, 60]
base_height_init: 0.62
