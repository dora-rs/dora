# Top-level evaluation run. `sim2sim eval --config configs/eval.yaml`
robot: robot/quad12.yaml      # resolved relative to this file
policy: policy/quad12_flat.yaml

# Which simulators to evaluate on. Unavailable backends (e.g. GPU sims on a CPU
# host) are reported and skipped, not fatal.
sims: [mujoco, pybullet]

episodes: 5
max_steps: 500
control_dt: 0.02              # 50 Hz policy rate
seeds: [0, 1, 2, 3, 4]

fall_height: 0.18             # base below this height (m) => fall
fall_tilt: 0.7                # |projected_gravity_z| dropping below this => tipped
render: false
