# Observation contract for a flat-terrain velocity-tracking policy on the
# LeRobot Humanoid legs. Term order + scales MUST match how the policy was
# trained (e.g. exported from lerobot-legged-zoo / unitree_rl_mjlab). This layout
# follows the common legged_gym / mjlab velocity task. For 12 DOF:
#   3 + 3 + 3 + 3 + 12 + 12 + 12 = 48-dim.

# Point at your ONNX policy exported from LeRobot (see README "Exporting from
# LeRobot"). Leave null to use a scripted baseline.
onnx_path: null

obs_terms:
  - { name: base_lin_vel,      scale: 2.0 }
  - { name: base_ang_vel,      scale: 0.25 }
  - { name: projected_gravity, scale: 1.0 }
  - { name: velocity_command,  scale: 1.0 }
  - { name: joint_pos_rel,     scale: 1.0 }
  - { name: joint_vel,         scale: 0.05 }
  - { name: last_action,       scale: 1.0 }

command_ranges:
  lin_vel_x: [-0.6, 0.6]
  lin_vel_y: [-0.3, 0.3]
  ang_vel_z: [-0.6, 0.6]

clip_actions: 5.0
