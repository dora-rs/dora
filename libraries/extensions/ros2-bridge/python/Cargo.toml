[package]
name = "dora-ros2-bridge-python"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
publish = false  # PyO3 cdylib, shipped via PyPI (maturin), not crates.io

[dependencies]
dora-ros2-bridge = { path = "..", default-features = false }
dora-ros2-bridge-msg-gen = { path = "../msg-gen" }
dora-ros2-bridge-arrow = { path = "../arrow" }
pyo3 = { workspace = true, features = ["eyre", "abi3-py311", "serde"] }
eyre = "0.6"
serde = "1.0.228"
arrow = { workspace = true, features = ["pyarrow"] }
futures = "0.3.32"
futures-timer = "3"

[build-dependencies]
pyo3-build-config = { workspace = true }

[dev-dependencies]
pyo3 = { workspace = true, features = ["auto-initialize"] }
serde_assert = "0.8.0"
