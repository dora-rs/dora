[package]
name = "dora-ros2-bridge-arrow"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
description = "Apache Arrow conversion helpers for ROS2 messages in dora"
license.workspace = true
repository.workspace = true

[dependencies]
dora-ros2-bridge-msg-gen = { path = "../msg-gen" }
arrow = { workspace = true }
eyre = { workspace = true }
ros2-client = "0.8"
serde = { workspace = true }

[dev-dependencies]
# CDR codec used by ros2-client 0.8 on the wire; used in tests to verify the
# real CDR byte layout (length prefixes, alignment) rather than just serde shape.
cdr-encoding = "0.11"
byteorder = "1"
