[package]
name = "adora-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
documentation.workspace = true
readme = "README.md"
description.workspace = true
license.workspace = true
repository.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
build = ["dep:git2", "dep:url"]
zenoh = ["dep:zenoh"]
type-inference = ["dep:syn"]

[dependencies]
adora-message = { workspace = true }
eyre = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
arrow-schema = { workspace = true }
which = "7"
uuid = { workspace = true }
tracing = { workspace = true }
serde-with-expand-env = "1.1.0"
tokio = { workspace = true, features = ["fs", "process", "sync", "rt"] }
schemars = "1.0.4"
serde_json = { workspace = true }
log = { version = "0.4.21", features = ["serde"] }
dunce = "1.0.5"
itertools = "0.14"
url = { version = "2.5.4", optional = true }
git2 = { workspace = true, optional = true }
fs_extra = "1.3.0"
splitty = "1.0.2"
zenoh = { workspace = true, optional = true }
syn = { version = "2", features = ["full", "visit"], optional = true }

[dev-dependencies]
tempfile = { workspace = true }
# Direct arrow-buffer access for unit tests of metadata.rs unsafe paths.
arrow-buffer = "58"
